name: sanitization-scheduled

# Scheduled FULL-TREE sanitization audit — the detection backstop for the
# diff-only PR gate. Because pull_request now scans only a PR's own diff
# (sanitization.yml), a leak could in principle reach the base package in a file
# no single PR touched (e.g. a rename, a merge, or an out-of-band edit). This lane
# re-scans the ENTIRE base package on a cron with BOTH layers, fail-closed —
# exactly the coverage the PR gate used to provide, moved off the critical path
# so it can't flaky-block contributors on pre-existing content.
#
# Runs on the default branch (main). workflow_dispatch allows an on-demand audit.
on:
  schedule:
    - cron: '17 9 * * *'   # daily, 09:17 UTC
  workflow_dispatch:

jobs:
  sanitize-full-tree:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Install scanner deps
        run: pip install -r scripts/requirements.txt
      - name: Scanner self-tests
        run: python -m pytest scripts/test_check_sanitization.py -q
      - name: Full-tree secrets & PII gate (deterministic — always enforced, no key needed)
        run: python scripts/check_sanitization.py --all --deterministic-only
      - name: Full-tree particulars gate (semantic — needs ANTHROPIC_API_KEY, fails closed)
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: python scripts/check_sanitization.py --all
