# =============================================================================
# SPIKE ARTIFACT — Letta runtime (Path 1). Do NOT wire into the deploy wizard.
# Branch: dev/juniperbevensee/swarm-map-letta-runtime  ·  see spec §4 steps 1–3.
#
# The whole point of this file: prove that HSM's EXISTING, runtime-neutral
# DockerService (lib/services/docker.ts) can start/stop/logs a Letta *server*
# container with ZERO new Docker code. A Letta "agent" is a row in Postgres,
# not a container — those are managed over REST by lib/services/letta.ts, a
# separate abstraction ("agents-as-API-resources").
#
# One `letta/letta` server (~500MB) hosts N agents against one Postgres. This is
# Path 1 from finding 2026-07-06-swarm-map-managing-letta-agents.md. Path 2
# (one server per agent, ~800MB each) is a non-starter on the RAM-constrained
# hardware and is explicitly rejected.
#
# Run it by hand, the same way DockerService would drive it:
#   ANTHROPIC_API_KEY=sk-ant-... docker compose -f docker/letta-compose.yml -p letta up -d
#   docker compose -f docker/letta-compose.yml -p letta logs -f letta
#   docker compose -f docker/letta-compose.yml -p letta stop letta
# then point the REST client at http://localhost:8283 (LETTA_BASE_URL).
#
# Docs caveat (docs.letta.com/guides/selfhosting, verified 2026-07-18): Letta
# flag the self-host Docker image as "no longer an actively maintained/supported
# product surface" and nudge toward Letta Cloud / local mode. Fine for a spike;
# a production host decision is out of scope here.
# =============================================================================

services:
  letta:
    # Pin to :latest for the spike — Letta's self-host docs give no stable
    # semver tag to pin against. A real deploy should pin a digest.
    image: letta/letta:latest
    container_name: letta
    restart: unless-stopped
    ports:
      # REST API (and the ADE web UI) — matches the :8283 the client defaults to.
      - published: 8283
        target: 8283
    environment:
      # Provider keys are SERVER-WIDE in self-hosted Letta (not per-agent) — a
      # key difference from Hermes, where creds are per-container env. Passed
      # through from the host env; unset ones are simply absent.
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY:-}
      - OPENAI_API_KEY=${OPENAI_API_KEY:-}
      # --- Shared external Postgres (production shape) ------------------------
      # For a shared/inspectable fleet, point Letta at a pgvector Postgres via
      # LETTA_PG_URI and the volume below becomes unnecessary. Left commented so
      # the spike runs with zero extra services (embedded PG, see volume). The
      # target DB MUST have the pgvector extension.
      # - LETTA_PG_URI=postgresql://letta:letta@letta-db:5432/letta
    volumes:
      # Persist the embedded Postgres so agents/memory survive restarts. This is
      # the "its Postgres volume" from the spike plan — embedded PG is what the
      # official `docker run` example uses.
      - letta-pgdata:/var/lib/postgresql/data

  # --- OPTIONAL shared pgvector Postgres (production shape) -------------------
  # Uncomment together with LETTA_PG_URI above to run a dedicated, inspectable
  # Postgres instead of the embedded one. Auditability of agent memory + message
  # history (rows in Postgres) is the entire trust proposition of the north-star
  # "Librarian in an Airlock" use-case — a shared PG is where that lives.
  # letta-db:
  #   image: ankane/pgvector:latest
  #   container_name: letta-db
  #   restart: unless-stopped
  #   environment:
  #     - POSTGRES_USER=letta
  #     - POSTGRES_PASSWORD=letta
  #     - POSTGRES_DB=letta
  #   volumes:
  #     - letta-dbdata:/var/lib/postgresql/data

volumes:
  letta-pgdata:
  # letta-dbdata:
