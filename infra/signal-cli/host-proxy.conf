# signal-cli >=0.14.2 pins the HTTP Host header to localhost variants
# (DNS-rebinding protection) and 421s anything else. Agent containers
# reach the daemon as host.docker.internal:8080, so this proxy owns the
# published host port and rewrites Host to a pinned value.
server {
    listen 8080;
    # JSON-RPC send with attachments can be large
    client_max_body_size 512m;
    location / {
        proxy_pass http://signal-cli-daemon:8080;
        proxy_set_header Host localhost:8080;
        # SSE: no buffering, long-lived stream
        proxy_http_version 1.1;
        proxy_set_header Connection "";
        proxy_buffering off;
        proxy_request_buffering off;
        proxy_read_timeout 24h;
        proxy_send_timeout 24h;
    }
}
