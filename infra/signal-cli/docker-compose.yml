services:
  signal-cli-daemon:
    build: .
    container_name: signal-cli-daemon
    restart: unless-stopped
    labels:
      - "autoheal=true"
    environment:
      - MODE=json-rpc
    ports:
      - "8080:8080"
    volumes:
      - ${HOME}/.hermes-swarm/signal-data:/home/.local/share/signal-cli
      # Agent data dirs mounted at host paths so signal-cli can read attachments
      # (agents translate container paths to host paths before sending to signal-cli)
      - ${HOME}/.hermes:${HOME}/.hermes:ro
      - ${HOME}/.hermes-cyborg:${HOME}/.hermes-cyborg:ro
      - ${HOME}/.hermes-osint:${HOME}/.hermes-osint:ro
      - ${HOME}/.hermes-cryptids:${HOME}/.hermes-cryptids:ro
      - ${HOME}/.hermes-egregore:${HOME}/.hermes-egregore:ro
      - ${HOME}/.hermes-evil-duck:${HOME}/.hermes-evil-duck:ro
    healthcheck:
      # signal-cli runs in JSON-RPC daemon mode — there is no REST /v1/about
      # endpoint (it 404s), so probe the JSON-RPC endpoint. This overrides the
      # image's baked HEALTHCHECK with an explicit, generous start_period so the
      # autoheal sidecar never fires while the daemon is still booting accounts.
      test: ["CMD-SHELL", "curl -sf --max-time 3 -X POST http://localhost:8080/api/v1/rpc -H 'Content-Type: application/json' -d '{\"jsonrpc\":\"2.0\",\"method\":\"listAccounts\",\"id\":\"hc\"}' | grep -q result"]
      interval: 30s
      timeout: 10s
      start_period: 90s
      retries: 3
    networks:
      - hermes-net

  # Auto-restart when signal-cli enters websocket reconnect loop.
  # The healthcheck detects degraded state via JSON-RPC responsiveness.
  signal-cli-autoheal:
    image: willfarrell/autoheal
    container_name: signal-cli-autoheal
    restart: unless-stopped
    environment:
      # Scope to containers labelled autoheal=true (only the daemon) so this
      # never restarts agent harness containers.
      - AUTOHEAL_CONTAINER_LABEL=autoheal
      - AUTOHEAL_INTERVAL=30
      - AUTOHEAL_START_PERIOD=120
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
    networks:
      - hermes-net

networks:
  hermes-net:
    external: true
